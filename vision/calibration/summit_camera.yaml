# Pose de la D435i sur le Summit XL HL
# Mesure : CAO OnShape (modèle Summit XL HL réel)
# Convention : ROS standard (X avant, Y gauche, Z haut)
# Frame parent : summit_xl_base_link (centre geometrique du chassis,
#                hauteur du moyeu des roues, convention Robotnik)
# Frame enfant : camera_link (frame publie par le driver realsense)

camera:
  parent_frame: "summit_xl_base_link"
  child_frame: "camera_link"
  position:
    x: 0.206
    y: 0.000
    z: 0.136
  orientation_rpy:    # roll, pitch, yaw en radians
    roll: 0.0
    pitch: 0.3986     # 22.839 degres vers le bas
    yaw: 0.0

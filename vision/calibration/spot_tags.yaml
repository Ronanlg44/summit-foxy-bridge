# Pose des 3 AprilTags sur le Spot
# Valeurs initiales : simulation Gazebo (a valider physiquement)
# Convention : ROS standard
# Frame parent : spot_base_link (centre body du Spot, convention BD)
# Tags : tag36h11 IDs 0, 1, 2

tags:
  tag_0:
    parent_frame: "spot_base_link"
    child_frame: "tag_0_link"
    description: "arriere - face vers -X du Spot"
    size: 0.10
    position:
      x: -0.43
      y:  0.00
      z:  0.01
    orientation_rpy:
      roll:  0.0
      pitch: 1.5708    # 90 degres : face du tag vers l'arriere
      yaw:   0.0

  tag_1:
    parent_frame: "spot_base_link"
    child_frame: "tag_1_link"
    description: "flanc gauche - face vers +Y du Spot"
    size: 0.09
    position:
      x:  0.00
      y:  0.12
      z:  0.01
    orientation_rpy:
      roll:  -1.5708
      pitch: -1.5708
      yaw:   0.0

  tag_2:
    parent_frame: "spot_base_link"
    child_frame: "tag_2_link"
    description: "flanc droit - face vers -Y du Spot"
    size: 0.09
    position:
      x:  0.00
      y: -0.12
      z:  0.01
    orientation_rpy:
      roll:  1.5708
      pitch: -1.5708
      yaw:   0.0

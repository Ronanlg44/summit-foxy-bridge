services:
  bridge:
    build: .
    image: summit-kinetic-foxy-bridge:20.04
    container_name: summit_foxy
    network_mode: host
    environment:
      - ROS_MASTER_URI=http://${ROBOT_IP}:11311
      - ROS_IP=${MY_IP}
      - ROS_DOMAIN_ID=${DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    extra_hosts:
      - "SXL00-181120AA:${ROBOT_IP}"
    restart: "no"
    command: ["dynamic"]

  # Terminal Foxy de test : prompt pret a l'emploi.
  # Lancement :  docker compose run --rm shell
  shell:
    image: summit-kinetic-foxy-bridge:20.04
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    entrypoint: ["/bin/bash", "-lc"]
    command: ["source /opt/ros/foxy/setup.bash && exec bash"]
    profiles: ["tools"]

  # Teleop clavier : envoie /cmd_vel au topic du robot.
  # Lancement :  docker compose run --rm teleop
  # Touches (voir l'ecran qui s'affiche) :
  #   i = avant     ,/m = arriere     j/l = rotation     k = STOP
  #   q/z = vitesse max +/-           x/e = lineaire +/- seul
  # Au demarrage, tape plusieurs fois 'z' pour reduire la vitesse max.
  teleop:
    image: summit-kinetic-foxy-bridge:20.04
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      - ROS_DOMAIN_ID=${DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - "source /opt/ros/foxy/setup.bash && ros2 run teleop_twist_keyboard teleop_twist_keyboard --ros-args -r /cmd_vel:=/summit_xl/robotnik_base_control/cmd_vel"
    profiles: ["tools"]

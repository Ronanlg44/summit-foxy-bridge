# Services :
#   - bridge  : le pont Kinetic <-> Foxy (toujours actif)
#   - shell   : un terminal Foxy pret a l'emploi
#   - teleop  : pilotage clavier (envoie /cmd_vel au robot)
#   - rviz    : visualisation 3D des capteurs et TF
#   - rqt     : outils graphiques (rqt_graph, rqt_plot, etc.)
#   - realsense : driver D435i (RGB + depth aligne + nuage de points)
#   - apriltag  : detecteur AprilTag36h11 sur le flux /camera/color
#
# Pour les services graphiques (rviz, rqt) il faut autoriser
# l'affichage UNE FOIS par session de bureau :
#   xhost +local:docker

services:
  bridge:
    build: .
    image: summit-kinetic-foxy-bridge:20.04
    container_name: summit_foxy
    network_mode: host
    environment:
      - ROS_MASTER_URI=http://${ROBOT_IP}:11311
      - ROS_IP=${MY_IP}
      - ROS_DOMAIN_ID=${DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    extra_hosts:
      - "SXL00-181120AA:${ROBOT_IP}"
    restart: "no"
    command: ["dynamic"]

  shell:
    image: summit-kinetic-foxy-bridge:20.04
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    entrypoint: ["/bin/bash", "-lc"]
    command: ["source /opt/ros/foxy/setup.bash && { [ -f /opt/apriltag_ws/install/setup.bash ] && source /opt/apriltag_ws/install/setup.bash; }; exec bash"]
    profiles: ["tools"]

  teleop:
    image: summit-kinetic-foxy-bridge:20.04
    network_mode: host
    stdin_open: true
    tty: true
    environment:
      - ROS_DOMAIN_ID=${DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - "source /opt/ros/foxy/setup.bash && ros2 run teleop_twist_keyboard teleop_twist_keyboard --ros-args -r /cmd_vel:=/summit_xl/robotnik_base_control/cmd_vel"
    profiles: ["tools"]

  rviz:
    image: summit-kinetic-foxy-bridge:20.04
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./rviz_configs:/rviz_configs:rw
    entrypoint: ["/bin/bash", "-lc"]
    command: ["source /opt/ros/foxy/setup.bash && ros2 run rviz2 rviz2"]
    profiles: ["tools"]

  rqt:
    image: summit-kinetic-foxy-bridge:20.04
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    entrypoint: ["/bin/bash", "-lc"]
    command: ["source /opt/ros/foxy/setup.bash && rqt"]
    profiles: ["tools"]
  realsense:
    image: summit-kinetic-foxy-bridge:20.04
    network_mode: host
    privileged: true
    environment:
      - ROS_DOMAIN_ID=${DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - /dev:/dev
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - "source /opt/ros/foxy/setup.bash && ros2 launch realsense2_camera rs_launch.py align_depth.enable:=true pointcloud.enable:=false initial_reset:=true depth_module.profile:=640x480x30 rgb_camera.profile:=640x480x30"
    profiles: ["tools"]
   
  apriltag:
    image: summit-kinetic-foxy-bridge:20.04
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${DOMAIN_ID}
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - "source /opt/ros/foxy/setup.bash && source /opt/apriltag_ws/install/setup.bash && ros2 launch apriltag_ros tag_realsense.launch.py camera_name:=/camera/color image_topic:=image_raw"
    profiles: ["tools"]
